services:
  neo4j:
    image: neo4j:5.15-community
    container_name: graphrag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    # Healthcheck removed - cypher-shell auth fails when DB was initialized with different password.
    # App uses depends_on: service_started instead of service_healthy.
    networks:
      - graphrag-network

  graphrag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag-app
    depends_on:
      neo4j:
        condition: service_started
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
    networks:
      - graphrag-network
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  graphrag-network:
    driver: bridge
